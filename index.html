<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Engine Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .edge-card { border-left: 4px solid #10b981; }
        .market-badge { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-white">Predictions Dashboard</h1>
                <p class="text-slate-400" id="meta-info">Loading session data...</p>
            </div>
            <div class="text-right">
                <span class="block text-xs text-slate-500 uppercase">Bankroll</span>
                <span class="text-2xl font-mono text-emerald-400" id="bankroll">KES --</span>
            </div>
        </header>

        <section class="mb-10">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <span class="bg-emerald-500 w-2 h-6 rounded mr-2"></span>
                Top Value Bets (EV+)
            </h2>
            <div id="edge-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>

        <section>
            <h2 class="text-xl font-semibold mb-4 text-slate-400">All Scanned Fixtures</h2>
            <div class="overflow-x-auto bg-slate-800 rounded-lg shadow-xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700 text-slate-300 text-sm">
                            <th class="p-4">Match</th>
                            <th class="p-4">League</th>
                            <th class="p-4 text-center">xG</th>
                            <th class="p-4 text-center">DRS</th>
                            <th class="p-4">Kickoff (UTC)</th>
                        </tr>
                    </thead>
                    <tbody id="fixture-table" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

  <script>
    const fetchData = async () => {
        try {
            const response = await fetch("predictions_latest.json");
            if (!response.ok) throw new Error("File not found");
            const data = await response.json();
            loadDashboard(data);
        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById("meta-info").textContent = "Error loading JSON. Ensure the server is running.";
        }
    }
function loadDashboard(data) {
    // 1. Smarter Safety Check: Only fail if meta or predictions are missing
    if (!data || !data.meta || !data.all_predictions) {
        console.error("Critical Data Missing:", data);
        document.getElementById("meta-info").textContent = "Error: Predictions list missing.";
        return;
    }

    // 2. Update Header
    const metaInfo = document.getElementById("meta-info");
    const bankroll = document.getElementById("bankroll");
    
    metaInfo.textContent = `Run ID: ${data.meta.run_id} | Scanned: ${data.meta.fixtures_scanned}`;
    bankroll.textContent = `KES ${data.meta.bankroll_kes.toLocaleString()}`;

    const edgeContainer = document.getElementById("edge-container");
    const fixtureTable = document.getElementById("fixture-table");

    edgeContainer.innerHTML = "";
    fixtureTable.innerHTML = "";

    // 3. Render Edge Bets (Handle empty or null lists)
    const edgeBets = data.all_edge_bets || []; 
    
    if (edgeBets.length === 0) {
        edgeContainer.innerHTML = `
            <div class="col-span-full p-6 bg-slate-800/50 border border-dashed border-slate-700 rounded-lg text-center text-slate-500">
                No bets currently meet the ${data.meta.ev_threshold_pct}% EV threshold.
            </div>`;
    } else {
        edgeBets.forEach(bet => {
            const edgeCard = document.createElement("div");
            edgeCard.className = "bg-slate-800 p-4 rounded-lg shadow edge-card";
            edgeCard.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="market-badge bg-emerald-900 text-emerald-300 px-2 py-1 rounded">${bet.market}</span>
                    <span class="text-xl font-bold text-white">@${bet.odds}</span>
                </div>
                <h3 class="text-lg font-semibold text-white">${bet.home} vs ${bet.away}</h3>
                <div class="mt-3 pt-3 border-t border-slate-700 text-sm flex justify-between">
                    <span class="text-emerald-400 font-bold text-lg">${bet.ev_pct}% EV</span>
                    <span class="text-slate-400">Edge: ${(bet.edge * 100).toFixed(1)}%</span>
                </div>
            `;
            edgeContainer.appendChild(edgeCard);
        });
    }

    // 4. Render Full Fixture Table (all_predictions)
    data.all_predictions.forEach(f => {
        const row = document.createElement("tr");
        row.className = "hover:bg-slate-700/50 transition border-b border-slate-700 text-sm";
        row.innerHTML = `
            <td class="p-4 font-medium">${f.home} vs ${f.away}</td>
            <td class="p-4 text-slate-400 text-xs">${f.league}</td>
            <td class="p-4 text-center font-mono text-blue-300">${f.combined_xg || '0.0'}</td>
            <td class="p-4 text-center font-mono ${f.drs > 0 ? 'text-emerald-400' : 'text-rose-400'}">${f.drs}</td>
            <td class="p-4 text-slate-500 text-xs">${f.kickoff_utc}</td>
        `;
        fixtureTable.appendChild(row);
    });
}
    // 5. CRITICAL: Trigger the fetch when the page loads
    window.onload = fetchData;
</script>
</body>
</html>
